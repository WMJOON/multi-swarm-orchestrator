# Workflow Template: Standard Module Workflow v0.6.1
#
# v0.6.1 phase-less model:
# - lifecycle 단계도 workflow/sub-workflow 이다.
# - node membership 은 workflow.steps[] 로 선언한다.
# - 자동 검증은 type: eval + oracle_type: metric 으로 표현한다.

module:
  name: "[REQUIRED] Module Display Name"
  id: "[REQUIRED] module-id (e.g., 05.new-module)"
  version: "[REQUIRED] 1.0.0"
  description: "[REQUIRED] 모듈의 목적과 핵심 기능 설명"
  owner: "[REQUIRED] owner@example.com"
  created: "[REQUIRED] 2026-05-21"

workflows:
  - id: discovery
    name: 발견 & 계획
    description: "요구사항 분석, 범위 정의, 전략 수립"
    status: completed
    steps:
      - type: step
        id: discovery-s-001
        label: "[CUSTOMIZE] 요구사항 분석"
        status: completed
        deliverables:
          - "[OPTIONAL] 기획 문서 위치"

  - id: development
    name: 개발 & 구현
    description: "핵심 기능 개발, 산출물 생성"
    status: active
    steps:
      - type: step
        id: development-s-001
        label: "[CUSTOMIZE] 주요 컴포넌트 구현"
        status: active
        directories:
          - role: input
            path: "[REQUIRED] input/"
          - role: output
            path: "[REQUIRED] output/"
        deliverables:
          - "[REQUIRED] 산출물"

      - type: eval
        id: development-e-001
        label: "[CUSTOMIZE] 구현 품질 검증"
        status: pending
        oracle_type: metric
        target: development
        target_artifact: "[REQUIRED] output/artifact.md"
        harness: "[OPTIONAL] test runner id"
        criteria:
          - "[REQUIRED] 품질 기준"
        branches:
          - on: fail
            goto: development-s-002
          - on: pass

      - type: step
        id: development-s-002
        label: "[CUSTOMIZE] 구현 개선 반영"
        instruction: "평가 결과를 바탕으로 development workflow의 산출물을 개선한다"
        status: pending
        evolves: development

  - id: testing
    name: 테스트 & 평가
    description: "품질 검증, 성능 측정, 최종 검수"
    status: pending
    steps:
      - type: eval
        id: testing-e-001
        label: "[CUSTOMIZE] 최종 평가"
        status: pending
        oracle_type: metric
        target: testing
        target_artifact: "[REQUIRED] output/artifact.md"
        harness: "[REQUIRED] validation runner id"
        criteria:
          - "[REQUIRED] 성공 기준 1"
          - "[OPTIONAL] 성공 기준 2"
        branches:
          - on: fail
            goto: testing-s-001
          - on: pass

      - type: step
        id: testing-s-001
        label: "[CUSTOMIZE] 테스트 개선 반영"
        instruction: "평가 결과를 바탕으로 testing workflow의 검증 절차를 개선한다"
        status: pending
        evolves: testing

deliverables:
  - type: documentation
    location: "docs/[module-id].md"
    status: draft

dependencies:
  - requires: "[CUSTOMIZE] External resource or module dependency"
    source: "[REQUIRED] module-id | external | internal"
    status: "[REQUIRED] ready|pending|received"
    usage: "[REQUIRED] How this dependency is used"

key_decisions:
  - decision: "[REQUIRED] What was decided"
    rationale: "[REQUIRED] Why this decision was made"
    status: "[REQUIRED] implemented|pending|reviewed"

timeline:
  - workflow: discovery
    duration: "[REQUIRED] X weeks"
    status: completed
    date: "[REQUIRED] YYYY-MM-DD to YYYY-MM-DD"

milestones:
  - id: "[OPTIONAL] m-milestone-1"
    name: "[OPTIONAL] Milestone name"
    date: "[OPTIONAL] YYYY-MM-DD"
    status: "[OPTIONAL] completed|pending"
