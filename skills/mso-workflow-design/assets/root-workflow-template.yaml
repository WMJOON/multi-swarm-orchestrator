project:
  name: AI Chatbot 1.0 - Root Workflow
  id: workflow-00
  version: 1.0.0
  description: "프로젝트 root workflow. 모듈 sub-workflow, artifact supply chain, eval gate를 조율한다."
  owner: owner@example.com
  created: 2026-05-21

milestones:
  - id: m-core-modules-ready
    name: 모든 핵심 모듈 완성
    date: 2026-05-21
    status: completed
    phase_ref: development
  - id: m-testing-complete
    name: 모든 모듈 테스트 완료
    date: 2026-05-22
    status: pending
    phase_ref: testing

key_decisions:
  - decision: RAG 평가 엔진을 GitHub submodule로 관리
    rationale: 독립적인 버전 관리와 외부 협업 경계를 분리하기 위함
    impact_modules:
      - rag-eval

critical_dependencies:
  - from: policy-engine
    to: ingestion
    description: 정책 수립을 위한 상담 데이터 분석 필요

success_criteria:
  - all_modules_documented: 모든 모듈 docs/ 문서 작성 완료
  - stakeholder_approval: 벤더 협업 완료 및 승인

workflows:
  - id: discovery
    name: 발견 & 계획
    description: 모듈별 요구사항 분석, 범위 정의, 리소스 할당
    status: completed
    steps:
      - type: step
        id: discovery-s-001
        label: 요구사항 수집
        instruction: 이해관계자 요구사항과 입력 artifact를 수집한다.
        status: completed
        deliverables:
          - planning/requirements.md

  - id: development
    name: 개발 & 구현
    description: 각 모듈의 핵심 기능 개발 및 구현
    status: active
    steps:
      - type: step
        id: development-s-001
        label: 핵심 모듈 구현
        instruction: 설계된 workflow에 따라 핵심 모듈 산출물을 구현한다.
        status: active
        directories:
          - role: input
            path: src/
          - role: output
            path: generated/
        deliverables:
          - generated/module-output.md

      - type: eval
        id: development-e-001
        label: 구현 품질 평가
        status: pending
        oracle_type: metric
        target: development
        target_artifact: generated/module-output.md
        harness: unit-test
        criteria:
          - unit tests pass
        branches:
          - on: fail
            goto: development-s-002
          - on: pass

      - type: step
        id: development-s-002
        label: 구현 개선 반영
        instruction: 평가 결과를 바탕으로 development workflow의 구현 규칙과 산출물을 개선한다.
        status: pending
        evolves: development

  - id: testing
    name: 테스트 & 평가
    description: 통합 테스트와 최종 평가
    status: pending
    steps:
      - type: eval
        id: testing-e-001
        label: 최종 통합 평가
        status: pending
        oracle_type: metric
        target: testing
        target_artifact: generated/module-output.md
        harness: integration-test
        criteria:
          - integration tests pass
        branches:
          - on: fail
            goto: testing-s-001
          - on: pass

      - type: step
        id: testing-s-001
        label: 테스트 개선 반영
        instruction: 통합 평가 결과를 바탕으로 testing workflow의 검증 조건과 실행 절차를 개선한다.
        status: pending
        evolves: testing
