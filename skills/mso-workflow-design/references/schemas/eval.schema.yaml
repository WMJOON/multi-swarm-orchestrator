type: eval
description: |
  산출물 평가 게이트. Decision gate와 분리한다.
  Decision gate는 process branch/진행 판단을 담당하고, Eval gate는 산출물의
  품질·정합·수용 가능성을 평가한다. 평가 주체는 oracle/oracle_type으로 표현한다.
  feedback loop 안에 Eval gate가 없으면
  산출물이 재귀적으로 소비되며 drift가 누적될 수 있다.
  단순히 여러 후보 artifact 중 하나를 고르거나 재생산 여부를 판단하는 경우는 Eval이
  아니라 decision_subject=user 인 Decision이다. Eval은 NLU engine process, evaluator,
  corpus 품질, 배포 가능성처럼 대상 artifact/process 자체의 품질·정합성을 판정할 때만 쓴다.
  여기서 [[process]]/[[processing artifact]]는 workflow control node가 아니라 agentTask의
  tool use를 가리키는 artifact-like target이다.
  관측 그래프에서는 artifact/tool-produced artifact --measured_by--> Eval,
  Eval --target--> [[workflow]], Eval --on:fail--> remediation agentTask,
  remediation agentTask --evolves--> [[workflow]], Eval --on:pass--> end 흐름으로 표현한다.
  agentTask가 실행 도구를 위임하는 경우만 agentTask --delegates_to--> [[tool]] 로 별도 표시한다.

fields:
  type:
    required: true
    type: literal
    value: eval

  id:
    required: true
    type: string
    immutable: true
    description: "Eval gate 노드 고유 식별자."

  label:
    required: true
    type: string
    description: "평가 대상과 기준을 한 줄로 설명한다."

  status:
    required: true
    type: enum
    values: [completed, active, pending]

  oracle_type:
    required: true
    type: enum
    values: [user, agent, metric]
    description: |
      판단 권위의 주체. user는 사람/팀 승인, agent는 모델·에이전트 평가,
      metric은 정량 지표/테스트 기준을 의미한다.

  evaluator:
    required: false
    type: string
    description: "평가자 식별자. 예: wmjoon, qa-agent, layout-fit-metric"

  oracle:
    required: false
    type: string
    description: "평가 주체 또는 권위 레이블. 예: Quality Gate, Review Oracle"

  target_artifact:
    required: false
    type: string
    description: "Eval이 검증하는 산출물, DB table, corpus, evaluator 등 artifact id/path."

  order_target:
    required: false
    type: string
    description: |
      평가 결과 개선·재작업 요청(requests_revision)을 받을 downstream Step id.
      tool/process를 target_artifact로 평가하는 Eval이면 order_target은 같은 tool/process를
      target_artifact로 갖는 remediation/optimization Step이어야 한다.

  order_artifact:
    required: false
    type: string
    description: "평가 결과 리포트 또는 manifest artifact 경로(eval:report 대상)."

  criteria:
    required: true
    type: list
    items: string
    description: "품질 판단 기준. 최소 1개 이상."

  threshold:
    required: false
    type: string
    description: "정량 기준 또는 에스컬레이션 조건."

  on_fail:
    required: false
    type: enum
    values: [block, retry, manual_review]
    default: block
    description: "legacy policy hint. topology는 branches의 on=fail/on=pass로 선언한다."

  branches:
    required: false
    type: list
    description: |
      평가 결과별 이동. on=fail은 Eval target workflow를 wf:evolves로 선언한 개선 Task로
      이동해야 하며, on=pass는 goto 없이 terminal end로 끝나야 한다.
    items:
      on:
        required: true
        type: string
        description: "fail 또는 pass. failed/passed legacy spelling은 import compatibility 용도."
      goto:
        required: false
        type: string
      label:
        required: false
        type: string

structural_invariants:
  - "id 는 워크플로우 내 unique"
  - "oracle_type ∈ {user, agent, metric}"
  - "criteria 최소 1개 이상"
  - "Decision gate와 Eval gate는 분리한다"
  - "후보 artifact 선택/재생산 판단은 Eval 이 아니라 decision_subject=user Decision 으로 표현한다"
  - "tool/process target Eval의 order_target은 routing Decision이 아니라 개선 Step을 가리킨다"
  - "Eval은 wf:next를 직접 쓰지 않고 branches로 진행한다"
  - "Eval on=fail branch는 Eval target workflow를 evolves로 선언한 개선 Task를 가리킨다"
  - "Eval on=pass branch는 goto 없이 terminal end로 끝난다"
  - "legacy YAML type: oracle 은 import 시 wf:Eval 로 투영한다"
