type: decision
description: |
  분기/판단 노드. workflow graph 는 task/decision 노드와 process edge 로 구성된다.
  decision 은 단일 class 이며, 판단 주체는 decision_subject property(user|agent)로
  표현한다. HITL/HITLFE/HOTL/HOOTL 같은 운영 수준은 workflow 경로에 user decision
  또는 user eval 이 개입하는지로 파생한다. 산출물 품질평가/판단 주체는 별도의 eval
  gate로 표현한다.

fields:
  type:
    required: true
    type: literal
    value: decision

  id:
    required: true
    type: string
    immutable: true
    description: |
      노드 고유 식별자. 네이밍 패턴은 프로젝트에서 정의
      (예: '{module-abbr}-d-{NNN}').

  label:
    required: true
    type: string
    description: "{동사} {목적어} [{맥락}] 패턴. 검토/평가 동사 권장."

  status:
    required: true
    type: enum
    values: [completed, active, pending]

  description:
    required: false
    type: string
    description: |
      판정 주체가 검토해야 할 항목을 자유 서술로 명시. multi-line 허용.
      decision_subject=user 인 경우 운영자가 무엇을 어떤 기준으로 보아야 하는지 적는다.

  decision_subject:
    required: true
    type: enum
    values: [user, agent]
    descriptions:
      user: "User Decision — 사람 또는 사용자 승인/검토가 process branch를 판단"
      agent: "Agent Decision — agent가 process branch를 판단하고 routing case를 edge에 명시"

  owner:
    required: false
    type: string
    description: "user decision 책임자 식별자 (이메일/팀명 등 — 형식은 프로젝트 정의)"

  sla:
    required: false
    type: string
    description: "인간 응답 SLA. 예: '24시간 이내'"

  threshold:
    required: false
    type: string
    description: "branch routing 판단 조건. 예: 'F1 < 0.87', 'confidence < 0.85'"

  decision_criteria:
    required: false
    type: string
    description: |
      agent decision 또는 조건부 user decision의 판단 기준. threshold보다 넓은 조건
      서술이며, 관측 그래프에서는 branch edge label 조건으로 표시한다.

  branches:
    required: false
    type: list
    description: "조건별 분기. 생략 시 → sequential next"
    items:
      on:
        required: true
        type: string
        description: "routing case. agent decision에서는 이 값이 판단 case의 stable label이다."
      goto:
        required: false
        type: string
        description: "이동할 node id. 생략 시 → sequential next"
      label:
        required: false
        type: string
        description: "분기 엣지 라벨(사람용 설명). Mermaid edge 라벨로 사용."

structural_invariants:
  - "id 는 워크플로우 내 unique"
  - "decision_subject ∈ {user, agent}"
  - "Decision gate와 Eval gate는 분리한다"
  - "agent decision 은 branches[].on 에 routing case 를 명시한다"
  - "agent decision 은 decision_criteria 또는 threshold/pass_criteria/success_criteria 중 하나로 판단 기준을 남긴다"

decision_matrix:
  - q: "판단 책임이 사람에게 있는가?"
    yes: user
    no: next
  - q: "판단 기준이 자동 라우팅 case 로 표현 가능한가?"
    yes: agent
    no: user
