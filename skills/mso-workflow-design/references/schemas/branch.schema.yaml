type: branch
description: |
  decision 노드의 조건별 분기. decision.branches[] 의 각 항목.
  on(조건) → goto(이동 node id) 매핑. 생략 시 sequential next.

fields:
  # NOTE: 'on' 은 YAML 1.1 boolean(True)로 파싱되므로 키를 반드시 따옴표로 감싼다.
  # 실제 workflow YAML 의 branches[].on 도 동일 — "on:" 으로 적거나, 미인용 시
  # 도구가 True→"on" 으로 정규화한다.
  "on":
    required: true
    type: string
    description: |
      분기 조건. agent decision에서는 routing case의 stable label이며,
      user decision에서는 사용자 판단 결과를 나타낸다.

  goto:
    required: false
    type: string
    description: "이동할 node id. 생략 시 sequential next."

  label:
    required: false
    type: string
    description: "분기 엣지 라벨(사람용 설명). Mermaid edge 라벨로 사용. round-trip 보존."

structural_invariants:
  - "on 비어있지 않음"
  - "agent decision 의 on 은 routing case 를 설명해야 함"
