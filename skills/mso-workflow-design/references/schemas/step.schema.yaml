type: step
description: "실행 작업 노드. I/O는 선택적."

fields:
  type:
    required: true
    type: literal
    value: step

  id:
    required: true
    type: string
    immutable: true
    description: |
      노드 고유 식별자. worklog/auditlog 추적 키.
      네이밍 패턴은 프로젝트에서 정의 (예: '{module-abbr}-s-{NNN}').

  label:
    required: true
    type: string
    description: |
      사람이 읽는 행위 설명(서술격). 권장 패턴: '{동사} {목적어} [{맥락}]'.
      동사 어휘는 프로젝트 컨벤션으로 정의. '무엇인지'를 나타냄 — directive 아님.

  instruction:
    required: true
    type: string
    description: |
      실행 지시(지시격/directive). 실행 주체가 '이걸 하라'는 명령 본문.
      label 이 '무엇인지' 서술이라면 instruction 은 실제 수행 지침이다.
      instruction 없는 Step 은 라벨만 있는 비실행 노드 → SHACL StepShape 위반.

  status:
    required: true
    type: enum
    values: [completed, active, pending]

  directories:
    required: false
    type: list
    description: "없으면 생략 가능 (순수 계산, API 호출 등)"
    items:
      role:
        required: true
        type: string
        description: |
          이 디렉토리의 역할. 자유형 string. 프로젝트 enum 컨벤션 권장.
          일반적인 값 예: input, output, input_output, reference, instruction.
          implementation/tool_internal/internal 계열은 tool 또는 step 내부 구현으로,
          artifact stream의 consumes/produces edge로 해석하지 않는다.
      path:
        required: true
        type: string

  deliverables:
    required: false
    type: list
    items: string

  uses_tool:
    required: false
    type: string
    description: |
      agentTask가 실행 중 사용하는 tool/capability. 관측 그래프에서
      agentTask --delegates_to--> [[tool]] 보조 edge로 표시한다. artifact stream에서는
      위임 효율을 보기 위해 artifact --consumes--> tool --produces--> artifact 흐름으로 렌더링한다.

  target_artifact:
    required: false
    type: string
    description: |
      이 Step이 개선·수정·조정 대상으로 삼는 artifact/tool/process.
      Eval의 order_target으로 호출되는 remediation/optimization Step에서 주로 사용한다.
      관측 그래프에서는 agentTask --target--> [[tool]] 로 표시한다. uses_tool이 실행 중
      위임 도구라면, target_artifact는 수정·개선 대상이다.

  validation:
    required: false
    type: list
    items: string

  sub_steps:
    required: false
    type: list
    items: string
    description: "선택적 상세 단계 (시각화·문서화 용)"

structural_invariants:
  - "id 는 워크플로우 내 unique"
  - "label 비어있지 않음"
  - "instruction 비어있지 않음 (지시격 — 실행 지시. SHACL StepShape 강제)"
  - "directories[].path 는 scaffold(index.yaml) 에 등록된 경로여야 함 (cross-skill invariant)"
  - "Eval.orderTarget 이 가리키는 개선 Step 은 필요 시 target_artifact 로 개선 대상을 명시한다"
